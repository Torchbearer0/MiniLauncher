name: Build Android APK without wrapper
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Install Gradle
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget https://services.gradle.org/distributions/gradle-8.4.1-bin.zip -O gradle.zip
          unzip gradle.zip -d $HOME/gradle
          echo "$HOME/gradle/gradle-8.4.1/bin" >> $GITHUB_PATH
      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk
